<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочая страница</title>
    <link rel="stylesheet" href="{% static 'registry/css/dashboard.css' %}">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <div class="brand">Hospital Registry</div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="logout" type="submit">Выйти</button>
            </form>
        </header>

        <main class="panel">
            <h1>Здравствуйте, {{ user.get_username }}.</h1>
            <p>Вы вошли в систему и видите пользовательскую страницу, доступную только авторизованным пользователям.</p>
        </main>
    </div>
</body>
</html>
